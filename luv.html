<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ขอโทษนะคนดี</title>
    <style>
        body {
            background-color: #ffe4e1;
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #ff6b6b;
            font-size: 2rem;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .gif-container {
            margin: 20px 0;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: #ff6b6b;
            color: white;
        }

        #noBtn {
            background-color: #ccc;
            color: #333;
            position: absolute;
            left: 210px;
        }

        .success-msg {
            display: none;
            font-size: 1.5rem;
            color: #ff6b6b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <h1>เค้าขอโทษนะ... 🥺</h1>
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwaGZ4ZzB6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Jm09Zw/LRVn5AvuF0Iu69W16t/giphy.gif" alt="cute cat" width="200">
        </div>
        <p>ดีกันนะคนเก่ง ไม่โกรธเค้าแล้วนะ<br>เค้าสัญญาว่าจะไม่ทำให้เสียใจอีก</p>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">หายงอนแล้ว</button>
            <button id="noBtn" onmouseover="moveButton()">ไม่!</button>
        </div>
    </div>

    <div id="success" class="success-msg">
        เย้! รักที่สุดเลย ❤️<br>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHRwaGZ4ZzB6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Jm09Zw/KztT2c4u8mYYUiCiS0/giphy.gif" width="250">
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.position = 'fixed';
        }

        function celebrate() {
            document.getElementById('mainBox').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            document.body.style.backgroundColor = '#ffc0cb';
        }
    </script>
</body>
</html>

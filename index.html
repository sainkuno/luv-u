<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #e0c3fc;
            --soft-white: #f8f7ff;
            --text-color: #4a4a4a;
            --main-accent: #9d71e8;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            position: relative;
            /* ป้องกันการเลื่อนหน้าจอไปมาบนมือถือ */
            touch-action: manipulation;
        }

        .floating-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .heart-shape {
            position: absolute;
            background: rgba(255,255,255,0.35);
            animation: float 10s infinite linear;
            opacity: 0;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .card {
            background: var(--soft-white);
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%; /* ปรับขนาดให้พอดีหน้าจอมือถือ */
            max-width: 350px;
            position: relative;
            z-index: 10;
        }

        .main-heart {
            color: var(--main-accent);
            font-size: 45px;
            margin-bottom: 10px;
            animation: beat 1s infinite alternate;
        }

        @keyframes beat { to { transform: scale(1.15); } }

        h1 { color: var(--main-accent); font-size: 1.4rem; margin-bottom: 15px; }

        #message-box {
            min-height: 90px;
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.5;
            padding: 0 10px;
        }

        #retry-image {
            width: 100%;
            max-width: 200px; /* ไม่ให้รูปใหญ่เกินไปบนมือถือ */
            height: auto;
            border-radius: 15px;
            margin: 0 auto 15px auto;
            display: none;
        }

        .btn-container {
            display: flex;
            flex-direction: column; /* วางปุ่มซ้อนกันในมือถือจะกดง่ายกว่า */
            gap: 12px;
            align-items: center;
        }

        button {
            width: 80%; /* ปุ่มยาวขึ้นเพื่อให้กดง่าย */
            padding: 14px 0;
            border: none;
            border-radius: 50px;
            font-family: 'Kanit', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        #yes-btn {
            background: var(--main-accent);
            color: white;
            box-shadow: 0 4px 15px rgba(157, 113, 232, 0.3);
        }

        #no-btn {
            background: #ededed;
            color: #888;
        }

        #retry-btn {
            display: none;
            background: #b892ff;
            color: white;
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="floating-background" id="background"></div>

    <div class="card">
        <div class="main-heart" id="card-icon">💜</div>
        <h1 id="title">เค้ามีอะไรจะบอก...</h1>
        
        <img src="" alt="Retry Image" id="retry-image">

        <div id="message-box"></div>
        
        <div class="btn-container" id="actions">
            <button id="yes-btn" onclick="sayYes()">ให้อภัย</button>
            <button id="no-btn" onclick="showRetry()">ไม่</button>
            <button id="retry-btn" onclick="resetCard()">เลือกใหม่นะ</button>
        </div>
    </div>

    <script>
        const originalText = "ขอโทษที่ทำให้ไม่สบายใจนะ... จะพยายามปรับปรุงตัวให้ดีขึ้น ไม่อยากให้น้อยใจ ดีกันนะ อีอ้วรนร 🥺";
        let index = 0;
        let isTyping = false;

        function typeWriter() {
            if (index < originalText.length && isTyping) {
                document.getElementById("message-box").innerHTML += originalText.charAt(index);
                index++;
                setTimeout(typeWriter, 50);
            }
        }

        function startTyping() {
            isTyping = true;
            document.getElementById("message-box").innerHTML = "";
            index = 0;
            typeWriter();
        }

        function showRetry() {
            isTyping = false;
            document.getElementById('title').innerHTML = "ปุ่มนี้กดไม่ได้นาา";
            document.getElementById('message-box').innerHTML = "ลองกดปุ่มข้างบนดูใหม่นะครับ";
            
            const retryImg = document.getElementById('retry-image');
            retryImg.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwaGZ4ZzB6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Z3B6Jm09Zw/LRVn5AvuF0Iu69W16t/giphy.gif"; 
            retryImg.style.display = 'block';

            document.getElementById('card-icon').style.display = 'none';
            document.getElementById('no-btn').style.display = 'none';
            document.getElementById('retry-btn').style.display = 'inline-block';
        }

        function resetCard() {
            document.getElementById('retry-image').style.display = 'none';
            document.getElementById('card-icon').style.display = 'block';
            document.getElementById('no-btn').style.display = 'inline-block';
            document.getElementById('retry-btn').style.display = 'none';
            document.getElementById('title').innerHTML = "เค้ามีอะไรจะบอก...";
            startTyping();
        }

        function sayYes() {
            isTyping = false;
            document.getElementById('retry-image').style.display = 'none';
            document.getElementById('card-icon').style.display = 'block';
            document.getElementById('title').innerHTML = "รักอิหมาเน่า";
            document.getElementById('message-box').innerHTML = "ดีกันแล้วนะ รักปักเป้านะจุฟๆ ❤️";
            document.getElementById('card-icon').innerHTML = "💜";
            document.getElementById('actions').style.display = 'none';
        }

        function createBackgroundHearts() {
            const container = document.getElementById('background');
            for(let i=0; i<15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-shape';
                const size = Math.random() * 25 + 10;
                heart.style.width = size + 'px';
                heart.style.height = size + 'px';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = (Math.random() * 8) + 's';
                heart.style.animationDuration = (Math.random() * 6 + 6) + 's';
                container.appendChild(heart);
            }
        }

        createBackgroundHearts();
        window.onload = startTyping;
    </script>
</body>
</html>>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --soft-white: #fff9fa;
            --text-color: #5d5d5d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ตกแต่งพื้นหลัง */
        .floating-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .heart-shape {
            position: absolute;
            background: rgba(255,255,255,0.4); /* สีหัวใจจางๆ */
            animation: float 10s infinite linear;
            opacity: 0;
            /* เทคนิคสร้างรูปหัวใจด้วย clip-path */
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            transform-origin: center;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* สไตล์ของการ์ด (เหมือนเดิม) */
        .card {
            background: var(--soft-white);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
            position: relative;
            z-index: 10;
        }

        .main-heart {
            color: #ff4d4d;
            font-size: 50px;
            margin-bottom: 10px;
            animation: beat 1s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        h1 { color: #ff6b6b; font-size: 1.5rem; margin-bottom: 20px; }

        #message-box {
            min-height: 80px;
            color: var(--text-color);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-family: 'Kanit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yes-btn {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }

        #yes-btn:hover { transform: scale(1.1); background: #ff4d4d; }

        #no-btn {
            background: #eee;

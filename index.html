<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --soft-white: #fff9fa;
            --text-color: #5d5d5d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }

        .card {
            background: var(--soft-white);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
            position: relative;
            z-index: 10;
        }

        .heart {
            color: #ff4d4d;
            font-size: 50px;
            margin-bottom: 10px;
            animation: beat 1s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        h1 { color: #ff6b6b; font-size: 1.5rem; margin-bottom: 20px; }

        #message-box {
            min-height: 80px;
            color: var(--text-color);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 50px;
            font-family: 'Kanit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yes-btn {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }

        #yes-btn:hover { transform: scale(1.1); background: #ff4d4d; }

        #no-btn {
            background: #eee;
            color: #999;
        }

        /* ตกแต่งพื้นหลัง */
        .floating-circles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .circle {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }
    </style>
</head>
<body>

    <div class="floating-circles" id="circles"></div>

    <div class="card">
        <div class="heart">❤️</div>
        <h1 id="title">เค้ามีอะไรจะบอก...</h1>
        <div id="message-box"></div>
        
        <div class="btn-container" id="actions">
            <button id="yes-btn" onclick="sayYes()">ให้อภัย</button>
            <button id="no-btn" onmouseover="flee()">ไม่</button>
        </div>
    </div>

    <script>
        const text = "ขอโทษที่ทำให้ไม่สบายใจนะ... ต่อไปนี้จะปรับปรุงตัวให้ดีขึ้น ไม่อยากให้เราโกรธกันนานเลย ดีกันนะคนเก่ง ของขวัญรออยู่ที่เค้านะครับ 🥺";
        let index = 0;

        function typeWriter() {
            if (index < text.length) {
                document.getElementById("message-box").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, 50);
            }
        }

        function flee() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function sayYes() {
            document.getElementById('title').innerHTML = "ขอบคุณนะค้าบ!";
            document.getElementById('message-box').innerHTML = "เย้! งั้นเดี๋ยวพาไปกินของอร่อยนะ รักที่สุดเลย ❤️";
            document.getElementById('actions').style.display = 'none';
            // เพิ่มเอฟเฟกต์หัวใจเต็มจอ
            for(let i=0; i<20; i++) { createHeart(); }
        }

        // สร้างวงกลมลอยไปมาในพื้นหลัง
        function createCircles() {
            const container = document.getElementById('circles');
            for(let i=0; i<15; i++) {
                const circle = document.createElement('div');
                const size = Math.random() * 50 + 10;
                circle.className = 'circle';
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(circle);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = '24px';
            heart.style.animation = 'rise 3s forwards';
            document.body.appendChild(heart);
        }

        createCircles();
        window.onload = typeWriter;
    </script>

    <style>
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        @keyframes rise {
            to { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</body>
</html>

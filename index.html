<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Achi ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #e0c3fc;
            --soft-white: #f8f7ff;
            --text-color: #4a4a4a;
            --main-accent: #9d71e8;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 90%);
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        /* หัวใจลอย */
        .floating-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .heart-shape {
            position: absolute;
            background: rgba(255,255,255,0.35);
            animation: float 10s infinite linear;
            opacity: 0;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .card {
            background: var(--soft-white);
            padding: 20px 10px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 250px;
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .main-heart {
            color: var(--main-accent);
            font-size: 45px;
            margin-bottom: 10px;
            animation: beat 1s infinite alternate;
        }

        @keyframes beat { to { transform: scale(1.15); } }

        h1 { color: var(--main-accent); font-size: 1.4rem; margin-bottom: 15px; font-weight: 500; }

        #message-box {
            min-height: 80px;
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.5;
            padding: 0 10px;
        }

        #display-image {
            width: 75%;
            max-width: 180px;
            height: auto;
            border-radius: 15px;
            margin: 0 auto 15px auto;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        button {
            width: 75%;
            padding: 14px 0;
            border: none;
            border-radius: 50px;
            font-family: 'Kanit', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        #yes-btn { background: var(--main-accent); color: white; box-shadow: 0 4px 15px rgba(157, 113, 232, 0.3); }
        #no-btn { background: #ededed; color: #888; }
        
        .extra-btn {
            background: #b892ff;
            color: white;
            box-shadow: 0 4px 15px rgba(184, 146, 255, 0.3);
        }

        /* หน้าสุดท้าย */
        #final-page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            width: 100%;
            max-width: 280px;
            animation: fadeIn 0.8s ease;
        }

        .final-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--main-accent);
            margin-bottom: 20px;
            text-shadow: 1px 1px 0px white;
        }

        .final-photo-container {
            width: 180px;
            height: 260px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transform: rotate(-3deg);
        }

        .final-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="floating-background" id="background"></div>

    <div class="card" id="main-card">
        <div class="main-heart" id="card-icon">💜</div>
        <h1 id="title">เค้ามีอะไรจะบอก...</h1>
        
        <img src="" alt="Moment" id="display-image">

        <div id="message-box"></div>
        
        <div class="btn-container">
            <button id="yes-btn" onclick="sayYes()">ให้อภัย</button>
            <button id="no-btn" onclick="showRetry()">ไม่</button>
            
            <button id="retry-btn" class="extra-btn" onclick="resetCard()" style="display: none;">เลือกใหม่นะ</button>
            <button id="more-btn" class="extra-btn" onclick="showFinal()" style="display: none;">มีอีก...</button>
        </div>
    </div>

    <div id="final-page">
        <div class="final-title">Luv U My Friend</div>
        <div class="final-photo-container">
            <img src="https://scontent.xx.fbcdn.net/v/t1.15752-9/664392085_1609513446949931_6697063004292937870_n.jpg?stp=dst-jpg_s960x960_tt6&_nc_cat=110&ccb=1-7&_nc_sid=9f807c&_nc_ohc=Jh_4otLiPRkQ7kNvwFvxXaa&_nc_oc=Adqwf-j68QskeNcbsMks8VqEZtAric5Pv7qKAg56iZjA6NG2I3x8X7SXmziLK6KFGWnHEVg0zFhLubMo16LvQjFm&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&_nc_ss=7a32e&oh=03_Q7cD5AGUzZ9WHDE6l4eNxuX15lW_mifFsmu02upQRX59xMZOcQ&oe=69FE23D4" class="final-photo">
        </div>
        <button onclick="location.reload()" style="background: white; color: var(--main-accent); margin-top: 30px; width: 140px; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">กลับหน้าแรก</button>
    </div>

    <script>
        const originalText = "ขอโทษที่ทำให้เสียใจนะ... จะพยายามปรับปรุงตัวให้ดีขึ้น ไม่อยากให้น้อยใจ ดีกันนะ อีอ้วรนร 🥺";
        let index = 0;
        let isTyping = false;

        // แสดงรูปเริ่มต้น
        const img = document.getElementById('display-image');
        img.src = "https://scontent.xx.fbcdn.net/v/t1.15752-9/663588659_954371336991226_8566557209408135130_n.jpg?stp=dst-jpg_s960x960_tt6&_nc_cat=111&ccb=1-7&_nc_sid=9f807c&_nc_ohc=zfhwQnE1HpkQ7kNvwHPXkZU&_nc_oc=AdqEnfJ61CpiHOKKizn1splR9wehU4x1_DoaZoWQEUFVnmJIkDP9DTxouiiHnrlEWyZOL4PiI_tNYwMmtaw5LIRK&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&_nc_ss=7a32e&oh=03_Q7cD5AGUzZ9WHDE6l4eNxuX15lW_mifFsmu02upQRX59xMZOcQ&oe=69FE20FE"; 
        img.style.display = 'block';

        function typeWriter() {
            if (index < originalText.length && isTyping) {
                document.getElementById("message-box").innerHTML += originalText.charAt(index);
                index++;
                setTimeout(typeWriter, 50);
            }
        }

        function startTyping() {
            isTyping = true;
            document.getElementById("message-box").innerHTML = "";
            index = 0;
            typeWriter();
        }

        function showRetry() {
            isTyping = false;
            document.getElementById('title').innerHTML = "เลือกใหม่นะจ๊ะอิอิ";
            document.getElementById('message-box').innerHTML = "อิอิ เลือกใหม่อีอ้วน";
            const img = document.getElementById('display-image');
            img.src = "https://scontent.xx.fbcdn.net/v/t1.15752-9/663772285_2161976371297810_5953343043148276564_n.jpg?stp=dst-jpg_s960x960_tt6&_nc_cat=110&ccb=1-7&_nc_sid=9f807c&_nc_ohc=-9oyW-Ut-ksQ7kNvwHUE3qY&_nc_oc=AdqqK-amNEametykBXVZ_ST1pwxJvXeSdcogPvHdXERgCFZhl1x95UKQk-ukEMjLPyR_RcshzmKMxlmzuA6ZGBLV&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&_nc_ss=7a32e&oh=03_Q7cD5AHl-lgoRCRGXFQ67ah8k54eKZ2hs4pc2eH52LH7EtmxSQ&oe=69FE09A4"; 
            img.style.display = 'block';
            document.getElementById('card-icon').style.display = 'none';
            document.getElementById('no-btn').style.display = 'none';
            document.getElementById('yes-btn').style.display = 'none';
            document.getElementById('retry-btn').style.display = 'inline-block';
        }

        function resetCard() {
            const img = document.getElementById('display-image');
            img.src = "https://scontent.xx.fbcdn.net/v/t1.15752-9/663588659_954371336991226_8566557209408135130_n.jpg?stp=dst-jpg_s960x960_tt6&_nc_cat=111&ccb=1-7&_nc_sid=9f807c&_nc_ohc=zfhwQnE1HpkQ7kNvwHPXkZU&_nc_oc=AdqEnfJ61CpiHOKKizn1splR9wehU4x1_DoaZoWQEUFVnmJIkDP9DTxouiiHnrlEWyZOL4PiI_tNYwMmtaw5LIRK&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&_nc_ss=7a32e&oh=03_Q7cD5AGUzZ9WHDE6l4eNxuX15lW_mifFsmu02upQRX59xMZOcQ&oe=69FE20FE";
            document.getElementById('card-icon').style.display = 'block';
            document.getElementById('no-btn').style.display = 'inline-block';
            document.getElementById('yes-btn').style.display = 'inline-block';
            document.getElementById('retry-btn').style.display = 'none';
            document.getElementById('title').innerHTML = "เค้ามีอะไรจะบอก...";
            startTyping();
        }

        function sayYes() {
            isTyping = false;
            document.getElementById('title').innerHTML = "รักอิหมาเน่า";
            document.getElementById('message-box').innerHTML = "ดีกันแล้วนะ รักปักเป้านะจุฟๆ ❤️";
            const img = document.getElementById('display-image');
            img.src = "https://scontent.xx.fbcdn.net/v/t1.15752-9/664910429_1587492883385676_524821245316040812_n.jpg?stp=dst-jpg_s960x960_tt6&_nc_cat=104&ccb=1-7&_nc_sid=9f807c&_nc_ohc=yecE8jMRx3EQ7kNvwEzzxTL&_nc_oc=AdpfUOqbYsupjjN_TFUqYnqdrQld7NLlcqs6cV2StS97w6R8RM_6vzgNAVy9ZvFSwNyru8rly-ea5yEEL24ZenwX&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.xx&_nc_ss=7a32e&oh=03_Q7cD5AFZE0LNLMPCYBaTRW7SclrzaPWOtkiwndjAT7yT35PrDQ&oe=69FE14E1"; 
            img.style.display = 'block';

            document.getElementById('yes-btn').style.display = 'none';
            document.getElementById('no-btn').style.display = 'none';
            document.getElementById('more-btn').style.display = 'inline-block';
        }

        function showFinal() {
            const card = document.getElementById('main-card');
            card.style.opacity = '0';
            card.style.transform = 'scale(0.8)';
            setTimeout(() => {
                card.style.display = 'none';
                document.getElementById('final-page').style.display = 'flex';
                document.body.style.background = "linear-gradient(135deg, #d8b4fe 0%, #818cf8 100%)";
            }, 400);
        }

        function createBackgroundHearts() {
            const container = document.getElementById('background');
            for(let i=0; i<15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-shape';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = (Math.random() * 8) + 's';
                container.appendChild(heart);
            }
        }
        createBackgroundHearts();
        window.onload = startTyping;
    </script>
</body>
</html>
